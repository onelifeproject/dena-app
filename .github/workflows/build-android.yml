name: Android Debug Cloud Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js (Web Environment)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java JDK (Android Environment)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Automatically Install Dependencies
      run: npm install

    - name: Bundle Web Dashboard (dist)
      run: npm run build

    - name: Sync Capacitor Web App to Android
      run: npx cap sync android

    - name: Read Android Version Metadata
      run: |
        VERSION_CODE=$(awk '/versionCode/ {print $2; exit}' android/app/build.gradle)
        VERSION_NAME=$(awk -F'"' '/versionName/ {print $2; exit}' android/app/build.gradle)
        APK_FILE_NAME="Dena-v${VERSION_NAME}(${VERSION_CODE})-debug.apk"
        echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
        echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
        echo "APK_FILE_NAME=$APK_FILE_NAME" >> "$GITHUB_ENV"

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew clean assembleDebug
        mv ./app/build/outputs/apk/debug/app-debug.apk "./app/build/outputs/apk/debug/${APK_FILE_NAME}"

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dena-Android-Debug-v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
        path: android/app/build/outputs/apk/debug/${{ env.APK_FILE_NAME }}
