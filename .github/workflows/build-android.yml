name: Android Signed Release Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js (Web Environment)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java JDK (Android Environment)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Automatically Install Dependencies
      run: npm install

    - name: Bundle Web Dashboard (dist)
      run: npm run build

    - name: Sync Capacitor Web App to Android
      run: npx cap sync android

    - name: Read Android Version Metadata
      run: |
        VERSION_CODE=$(awk '/versionCode/ {print $2; exit}' android/app/build.gradle)
        VERSION_NAME=$(awk -F'"' '/versionName/ {print $2; exit}' android/app/build.gradle)
        APK_FILE_NAME="Dena-v${VERSION_NAME}.apk"
        echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
        echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
        echo "APK_FILE_NAME=$APK_FILE_NAME" >> "$GITHUB_ENV"

    - name: Validate Signing Files
      run: |
        [ -f "android/keystore/signing.properties" ] || (echo "Missing android/keystore/signing.properties in repo" && exit 1)
        STORE_FILE=$(awk -F'=' '/^storeFile=/ {print $2; exit}' android/keystore/signing.properties | tr -d '\r')
        [ -n "$STORE_FILE" ] || (echo "Missing storeFile in android/keystore/signing.properties" && exit 1)
        [ -f "android/${STORE_FILE}" ] || (echo "Missing keystore file at android/${STORE_FILE}" && exit 1)

    - name: Build Signed Release APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew clean assembleRelease
        mv ./app/build/outputs/apk/release/app-release.apk "./app/build/outputs/apk/release/${APK_FILE_NAME}"

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dena-Android-v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
        path: android/app/build/outputs/apk/release/${{ env.APK_FILE_NAME }}

    - name: Publish GitHub Release (Tag + APK)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="v${VERSION_NAME}"
        RELEASE_TITLE="Dena ${TAG_NAME}"
        APK_PATH="android/app/build/outputs/apk/release/${APK_FILE_NAME}"

        if gh release view "$TAG_NAME" >/dev/null 2>&1; then
          echo "Release exists for ${TAG_NAME}. Uploading APK (overwrite if needed)."
          gh release upload "$TAG_NAME" "$APK_PATH" --clobber
        else
          echo "Creating release ${TAG_NAME} with APK."
          gh release create "$TAG_NAME" "$APK_PATH" --title "$RELEASE_TITLE" --notes "Automated Android release build."
        fi
